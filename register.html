<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kayıt Ol | SafeTrade AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .auth-container {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 100px);
            padding: 2rem;
        }

        .auth-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 3rem;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(20px);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .auth-header h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .auth-header p {
            color: var(--text-dim);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        @media (max-width: 500px) {
            .form-row {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-dim);
        }

        .form-input {
            width: 100%;
            padding: 1rem 1.25rem;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-light);
            font-family: inherit;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        .auth-button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .auth-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56, 189, 248, 0.3);
        }

        .auth-footer {
            margin-top: 2rem;
            text-align: center;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .auth-footer a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .auth-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 1rem;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            display: none;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <header class="container">
        <nav class="navbar">
            <a href="index.html" class="logo" style="text-decoration: none;">
                <div class="logo-icon">
                    <i data-lucide="shield" style="color:white; width:18px; height:18px"></i>
                </div>
                <span>SafeTrade <b>AI</b></span>
            </a>
            <div class="nav-links">
                <a href="index.html">Özellikler</a>
                <a href="index.html">Fiyatlandırma</a>
            </div>
            <div class="nav-actions">
                <a href="login.html" class="btn-text">Giriş Yap</a>
            </div>
        </nav>
    </header>

    <main class="container">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <h1>Hesap Oluştur</h1>
                    <p>Hemen analizlere başlayın</p>
                </div>

                <div id="errorMessage" class="error-message"></div>

                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Ad Soyad</label>
                        <input type="text" id="fullName" class="form-input" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="companyName">Şirket Adı (Opsiyonel)</label>
                        <input type="text" id="companyName" class="form-input" placeholder="Tech Corp">
                    </div>

                    <div class="form-group">
                        <label for="email">E-posta Adresi</label>
                        <input type="email" id="email" class="form-input" required placeholder="ornek@sirket.com">
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="password">Şifre</label>
                            <input type="password" id="password" class="form-input" required minlength="8" placeholder="••••••••">
                        </div>
                        <div class="form-group">
                            <label for="passwordConfirm">Şifre Tekrar</label>
                            <input type="password" id="passwordConfirm" class="form-input" required minlength="8" placeholder="••••••••">
                        </div>
                    </div>

                    <button type="submit" class="auth-button" id="submitBtn">
                        Kayıt Ol
                    </button>
                </form>

                <div class="auth-footer">
                    Zaten hesabınız var mı? <a href="login.html">Giriş Yapın</a>
                </div>
            </div>
        </div>
    </main>

    <script src="app.js"></script>
    <script src="auth.js"></script>
    <script>
        lucide.createIcons();

        AuthManager.redirectIfAuthenticated();

        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const fullName = document.getElementById('fullName').value;
            const companyName = document.getElementById('companyName').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const passwordConfirm = document.getElementById('passwordConfirm').value;
            
            const submitBtn = document.getElementById('submitBtn');
            const errorMsg = document.getElementById('errorMessage');

            if (password !== passwordConfirm) {
                errorMsg.textContent = "Şifreler eşleşmiyor.";
                errorMsg.style.display = 'block';
                return;
            }

            submitBtn.textContent = 'Hesap Oluşturuluyor...';
            submitBtn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${API_BASE}/auth/register`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        full_name: fullName,
                        company_name: companyName
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.detail || 'Kayıt işlemi başarısız oldu.');
                }

                // Başarılı kayıt sonrası login'e yönlendir (veya otomatik login yap)
                alert("Kayıt başarılı! Lütfen giriş yapın.");
                window.location.href = 'login.html';
                
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                submitBtn.textContent = 'Kayıt Ol';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
